<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My 2 Cents</title>

  <!-- Firebase v10 compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.5rem;
      color: #f0b429;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #aaa;
      font-size: 1rem;
    }

    .card {
      background: #242424;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #f0b429;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      background: #1a1a1a;
      color: #f5f5f5;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #f0b429;
    }

    #char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.4rem;
      margin-bottom: 1.25rem;
    }

    .step {
      margin-bottom: 1rem;
    }

    .step-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .venmo-btn {
      display: inline-block;
      background: #008cff;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .venmo-btn:hover { background: #0070d4; }

    .venmo-btn.paid {
      background: #2a7a2a;
    }

    #submit-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: not-allowed;
      background: #333;
      color: #666;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
    }

    #submit-btn.enabled {
      background: #f0b429;
      color: #1a1a1a;
      cursor: pointer;
    }

    #submit-btn.enabled:hover { background: #d9a020; }

    #form-status {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      min-height: 1.2em;
      text-align: center;
    }

    #form-status.success { color: #4caf50; }
    #form-status.error   { color: #f44336; }

    .feed-card { margin-top: 0; }

    .opinion-card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .opinion-card p {
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .opinion-card .ts {
      font-size: 0.72rem;
      color: #555;
      text-align: right;
      margin-top: 0.6rem;
    }

    #feed-empty {
      color: #555;
      font-style: italic;
      text-align: center;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>My 2 Cents</h1>
      <p>Share your opinion — but first, put your money where your mouth is.</p>
    </header>

    <!-- SUBMISSION FORM -->
    <div class="card">
      <h2>Leave Your 2 Cents</h2>

      <textarea id="opinion-input" maxlength="500"
        placeholder="What's on your mind?"></textarea>
      <div id="char-count">0 / 500</div>

      <div class="step">
        <div class="step-label">Step 1 — Pay $0.02 on Venmo</div>
        <a id="venmo-link"
           href="#"
           class="venmo-btn"
           onclick="openVenmo(); return false;">
          Pay $0.02 on Venmo →
        </a>
      </div>

      <div class="step">
        <div class="step-label">Step 2 — Submit your opinion</div>
        <button id="submit-btn" disabled onclick="submitOpinion()">
          Submit My 2 Cents
        </button>
      </div>

      <div id="form-status"></div>
    </div>

    <!-- PUBLIC FEED -->
    <div class="card feed-card">
      <h2>What People Are Saying</h2>
      <div id="feed">
        <div id="feed-empty">Loading opinions...</div>
      </div>
    </div>

  </div>

  <script>
    // ================================================================
    //  FIREBASE SETUP — REPLACE THIS BLOCK WITH YOUR OWN CONFIG
    //
    //  How to get your config:
    //  1. Go to https://console.firebase.google.com
    //  2. Create a project (or use an existing one)
    //  3. Click the </> Web icon on the project overview to register a web app
    //  4. Copy the firebaseConfig object and paste it below
    //  5. Enable Firestore: Build > Firestore Database > Create database
    //     (choose production mode, then apply the security rules below)
    //
    //  Firestore security rules to paste in Firebase Console > Firestore > Rules:
    //
    //  rules_version = '2';
    //  service cloud.firestore {
    //    match /databases/{database}/documents {
    //      match /opinions/{docId} {
    //        allow read: if true;
    //        allow create: if request.resource.data.keys().hasAll(["text", "createdAt"])
    //          && request.resource.data.text is string
    //          && request.resource.data.text.size() > 0
    //          && request.resource.data.text.size() <= 500;
    //        allow update, delete: if false;
    //      }
    //    }
    //  }
    // ================================================================
    
    const firebaseConfig = {
      apiKey: "AIzaSyBvTXUROlqVPB-2mLpLZ87ha0aQKc_UBOY",
      authDomain: "my-2-cents-15364.firebaseapp.com",
      projectId: "my-2-cents-15364",
      storageBucket: "my-2-cents-15364.firebasestorage.app",
      messagingSenderId: "908277139065",
      appId: "1:908277139065:web:8035fb4b4af9f38112b6a8",
      measurementId: "G-7RNZZYPQ72"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const COLLECTION = "opinions";

    // --- Venmo deep link + honor system unlock ---
    const VENMO_WEB = 'https://account.venmo.com/pay?recipients=Amnon-Karni&amount=0.02&note=My+2+Cents';
    const VENMO_APP = 'venmo://paycharge?txn=pay&recipients=Amnon-Karni&amount=0.02&note=My+2+Cents';

    function openVenmo() {
      handleVenmoClick();
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (!isMobile) {
        window.open(VENMO_WEB, '_blank');
        return;
      }
      // Try native app; fall back to web only if app didn't open
      window.location.href = VENMO_APP;
      setTimeout(() => {
        if (!document.hidden) {
          window.open(VENMO_WEB, '_blank');
        }
      }, 1500);
    }

    let venmoClicked = false;

    function handleVenmoClick() {
      venmoClicked = true;
      const btn = document.getElementById("submit-btn");
      btn.disabled = false;
      btn.classList.add("enabled");
      const link = document.getElementById("venmo-link");
      link.classList.add("paid");
      link.textContent = "Paid ✓";
    }

    // --- Character counter ---
    const input = document.getElementById("opinion-input");
    const charCount = document.getElementById("char-count");

    input.addEventListener("input", () => {
      charCount.textContent = `${input.value.length} / 500`;
    });

    // --- Submit ---
    async function submitOpinion() {
      const text = input.value.trim();
      if (!text) {
        showStatus("Please write something first.", "error");
        return;
      }

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Submitting...";

      try {
        await db.collection(COLLECTION).add({
          text: text,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Reset form
        input.value = "";
        charCount.textContent = "0 / 500";
        venmoClicked = false;
        btn.classList.remove("enabled");
        btn.textContent = "Submit My 2 Cents";

        const link = document.getElementById("venmo-link");
        link.classList.remove("paid");
        link.textContent = "Pay $0.02 on Venmo →";

        showStatus("Your 2 cents have been shared!", "success");
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Submit My 2 Cents";
        showStatus("Something went wrong. Please try again.", "error");
        console.error(err);
      }
    }

    // --- Live feed ---
    db.collection(COLLECTION)
      .orderBy("createdAt", "desc")
      .onSnapshot(
        snapshot => {
          const feed = document.getElementById("feed");
          if (snapshot.empty) {
            feed.innerHTML = '<div id="feed-empty">No opinions yet. Be the first!</div>';
            return;
          }
          feed.innerHTML = "";
          snapshot.forEach(doc => {
            const data = doc.data();
            const ts = data.createdAt
              ? new Date(data.createdAt.toMillis()).toLocaleString()
              : "just now";

            const card = document.createElement("div");
            card.className = "opinion-card";

            const p = document.createElement("p");
            p.textContent = data.text; // textContent, not innerHTML — prevents XSS

            const time = document.createElement("div");
            time.className = "ts";
            time.textContent = ts;

            card.appendChild(p);
            card.appendChild(time);
            feed.appendChild(card);
          });
        },
        err => {
          document.getElementById("feed").innerHTML =
            '<div id="feed-empty">Could not load opinions.</div>';
          console.error(err);
        }
      );

    // --- Status helper ---
    function showStatus(msg, type) {
      const el = document.getElementById("form-status");
      el.textContent = msg;
      el.className = type;
      setTimeout(() => { el.textContent = ""; el.className = ""; }, 4000);
    }
  </script>
</body>
</html>
